<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadIt — Free PDF Reader</title>
    <meta name="description" content="A free, premium PDF reader. No subscriptions, no paywalls. Open, read, search, and navigate PDFs right in your browser.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <!-- ============ WELCOME SCREEN ============ -->
    <div id="welcome-screen">
        <div id="welcome-content">
            <div id="welcome-logo">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                    <rect x="8" y="4" width="40" height="52" rx="4" stroke="url(#grad)" stroke-width="3" fill="none"/>
                    <rect x="16" y="16" width="24" height="3" rx="1.5" fill="url(#grad)" opacity="0.7"/>
                    <rect x="16" y="24" width="20" height="3" rx="1.5" fill="url(#grad)" opacity="0.5"/>
                    <rect x="16" y="32" width="24" height="3" rx="1.5" fill="url(#grad)" opacity="0.7"/>
                    <rect x="16" y="40" width="16" height="3" rx="1.5" fill="url(#grad)" opacity="0.5"/>
                    <defs>
                        <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64">
                            <stop offset="0%" stop-color="#8b5cf6"/>
                            <stop offset="100%" stop-color="#06b6d4"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 id="welcome-title">Read<span class="accent">It</span></h1>
            <p id="welcome-subtitle">Your free, premium PDF reader. No fees. Ever.</p>
            <div id="drop-zone">
                <div id="drop-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <p class="drop-text">Drag & drop your PDF here</p>
                <p class="drop-text-sub">or</p>
                <button id="btn-open-file" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    </svg>
                    Browse Files
                </button>
            </div>
            <p id="welcome-footer">100% client-side • No uploads • Your files stay private</p>
        </div>
    </div>

    <!-- ============ MAIN APP ============ -->
    <div id="app" class="hidden">

        <!-- TOOLBAR -->
        <header id="toolbar">
            <div class="toolbar-group">
                <button id="btn-sidebar-toggle" class="tool-btn" title="Toggle Sidebar (T)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </button>
                <button id="btn-open" class="tool-btn" title="Open PDF (Ctrl+O)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                </button>
                <div class="toolbar-separator"></div>
            </div>

            <div class="toolbar-group">
                <button id="btn-prev" class="tool-btn" title="Previous Page (←)" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <div id="page-info">
                    <input type="number" id="page-input" value="1" min="1"> 
                    <span id="page-separator">/</span>
                    <span id="page-total">0</span>
                </div>
                <button id="btn-next" class="tool-btn" title="Next Page (→)" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
                </button>
                <div class="toolbar-separator"></div>
            </div>

            <div class="toolbar-group">
                <button id="btn-zoom-out" class="tool-btn" title="Zoom Out (-)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                </button>
                <span id="zoom-level">100%</span>
                <button id="btn-zoom-in" class="tool-btn" title="Zoom In (+)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                </button>
                <select id="zoom-select" title="Zoom Preset">
                    <option value="0.5">50%</option>
                    <option value="0.75">75%</option>
                    <option value="1" selected>100%</option>
                    <option value="1.25">125%</option>
                    <option value="1.5">150%</option>
                    <option value="2">200%</option>
                    <option value="fit-width">Fit Width</option>
                    <option value="fit-page">Fit Page</option>
                </select>
                <div class="toolbar-separator"></div>
            </div>

            <div class="toolbar-group toolbar-right">
                <button id="btn-search" class="tool-btn" title="Search (Ctrl+F)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
                <button id="btn-print" class="tool-btn" title="Print (Ctrl+P)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                </button>
                <button id="btn-fullscreen" class="tool-btn" title="Fullscreen (F11)">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </button>
                <button id="btn-darkmode" class="tool-btn" title="Toggle Dark/Light Mode">
                    <svg id="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    <svg id="icon-sun" class="hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </div>
        </header>

        <!-- SEARCH BAR -->
        <div id="search-bar" class="hidden">
            <div id="search-container">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="Search in document...">
                <span id="search-count"></span>
                <button id="btn-search-prev" class="search-nav-btn" title="Previous Match">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
                </button>
                <button id="btn-search-next" class="search-nav-btn" title="Next Match">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <button id="btn-search-close" class="search-nav-btn" title="Close (Esc)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>

        <!-- BODY -->
        <div id="main-body">
            <!-- SIDEBAR -->
            <aside id="sidebar">
                <div id="sidebar-header">
                    <span>Pages</span>
                </div>
                <div id="thumbnail-container"></div>
            </aside>

            <!-- VIEWER -->
            <main id="viewer-container">
                <div id="viewer"></div>
            </main>
        </div>

        <!-- PROGRESS BAR -->
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>

    </div>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept=".pdf" hidden>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
